<!DOCTYPE html>
<html >
  <head>
    <meta charset="UTF-8">
    <title>A Pen by  Drew Harwell</title>
    
    
    
    
        <link rel="stylesheet" href="css/style.css">

    
    
    
  </head>

  <body>

    <link href='https://fonts.googleapis.com/css?family=Roboto:300' rel='stylesheet' type='text/css'>
<div class="calculator">
  <div class="results"></div>
  <div class="btn red" action="clear">AC</div>
  <div class="btn red" action="clear">CE</div>
  <div class="btn op" action="%">%</div>
  <div class="btn op" action="/">÷</div>
  <div class="btn" action="7">7</div>
  <div class="btn" action="8">8</div>
  <div class="btn" action="9">9</div>
  <div class="btn op" action="*">x</div>
  <div class="btn" action="4">4</div>
  <div class="btn" action="5">5</div>
  <div class="btn" action="6">6</div>
  <div class="btn op" action="-">-</div>
  <div class="btn" action="1">1</div>
  <div class="btn" action="2">2</div>
  <div class="btn" action="3">3</div>
  <div class="btn plus op" action="+">+</div>
  <div class="btn up" action="0">0</div>
  <div class="btn up" action=".">.</div>
  <div class="btn up op" action="=">=</div>
</div>
    <script src='http://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js'></script>

        <script src="js/index.js"></script>

    
    
    
  </body>
</html>
